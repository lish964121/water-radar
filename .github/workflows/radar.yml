name: Water Radar
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests feedparser
      - run: python .github/workflows/radar.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
